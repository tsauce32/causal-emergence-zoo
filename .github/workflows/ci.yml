name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Build wheel
        run: python -m build --wheel
      - name: Smoke test wheel data loading
        run: |
          python -m venv wheel-smoke
          wheel-smoke/bin/python -m pip install dist/*.whl
          wheel-smoke/bin/python - <<'PY'
          from causal_emergence_zoo import available_systems, load_system

          systems = available_systems()
          assert "two_block_noisy_4" in systems, systems
          system = load_system("two_block_noisy_4")
          assert system["state_count"] == 4
          assert system["emergent_hierarchy"]["best_partition"]["partition_id"] == "01|23"
          PY
